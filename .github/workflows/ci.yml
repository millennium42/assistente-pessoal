name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend e API
    runs-on: windows-latest

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v6

      - name: Instalar uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.12"

      - name: Criar ambiente
        run: uv venv --python 3.12

      - name: Instalar projeto
        run: uv pip install -e ".[dev]"

      - name: Rodar testes
        run: uv run pytest

      - name: Rodar lint
        run: uv run ruff check .

      - name: Conferir formatacao
        run: uv run ruff format --check .

      - name: Rodar mypy
        run: uv run mypy src

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  frontend:
    name: Frontend desktop
    runs-on: windows-latest

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v6

      - name: Instalar Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Instalar dependencias
        working-directory: apps/desktop
        run: npm install

      - name: Testar frontend
        working-directory: apps/desktop
        run: npm run test

      - name: Build web
        working-directory: apps/desktop
        run: npm run build
