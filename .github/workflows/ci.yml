name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  qualidade:
    name: Testes e qualidade
    runs-on: ubuntu-latest

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v6

      - name: Instalar uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.12"

      - name: Criar ambiente
        run: uv venv --python 3.12

      - name: Instalar projeto
        run: uv pip install -e ".[dev]"

      - name: Rodar testes
        run: uv run pytest

      - name: Rodar lint
        run: uv run ruff check .

      - name: Conferir formatacao
        run: uv run ruff format --check .

